spring.application.name=study-planner-backend
# PORT is injected by most PaaS providers (Render, Railway, Fly, Heroku).
server.port=${PORT:8080}

# --- Database ---
# Override SPRING_DATASOURCE_URL/USER/PASSWORD in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyplanner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:neebal}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- JWT ---
# MUST be overridden in production via env var. Must be >=32 bytes for HS256.
app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-please-32bytes}
app.jwt.expiration-ms=86400000

# --- CORS ---
# Comma-separated list of allowed origins. In prod, set this to your frontend URL.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- Logging ---
logging.level.org.springframework.security=INFO
